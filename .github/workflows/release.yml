name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Create release PR or tag
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          # We don't publish to npm; `bun run release` runs `changeset tag`,
          # which pushes a git tag and creates a GitHub Release. The Docker
          # workflow then picks up that tag via its `push: tags: ['v*']`
          # trigger and builds + pushes the image.
          #
          # IMPORTANT: this requires a Personal Access Token (or GitHub App
          # token) stored in `secrets.RELEASE_PAT` with `contents: write`
          # scope. Tags pushed by the default `GITHUB_TOKEN` do NOT fire
          # downstream workflows, so the Docker workflow would otherwise
          # never run for release tags.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
