name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

env:
  GHCR_SLUG: ghcr.io/laplace-live/jupiter

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Create release PR or tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          # We don't publish to npm; `bun run release` runs `changeset tag`,
          # which pushes a git tag and creates a GitHub Release. Tags pushed
          # by GITHUB_TOKEN don't fire downstream `push` events, so the
          # Docker image for the new tag is built in the steps below using
          # the action's `published` output instead of a separate workflow.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Docker build (only when a publish actually happened) ----

      - name: Set up QEMU
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: steps.changesets.outputs.published == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_SLUG }}
          # The published tag (e.g. v1.0.8) isn't the current ref, so feed
          # the version explicitly from package.json and let metadata-action
          # expand it into the full semver tag set.
          tags: |
            type=semver,pattern={{version}},value=v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}
            type=semver,pattern={{major}},value=v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}
            type=raw,value=latest

      - name: Build and push
        if: steps.changesets.outputs.published == 'true'
        uses: docker/bake-action@v7
        with:
          files: |
            ./docker-bake.hcl
            ${{ steps.meta.outputs.bake-file }}
          source: .
          targets: build-all
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
